version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hrms-backend
    ports:
      - "8000:8000"
    volumes:
      - hrms-data:/data        # SQLite database persists here
    environment:
      - DATABASE_URL=sqlite:////data/hrms.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: hrms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  hrms-data:
